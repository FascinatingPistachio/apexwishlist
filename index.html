<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Wishlist | Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="keyGatekeeper" class="modal-overlay gatekeeper">
        <div class="modal">
            <div class="modal-header">
                <h2>🔑 API ACCESS REQUIRED</h2>
            </div>
            <p class="subtitle">Enter your ApexLegendsAPI.com key to sync crafting and data.</p>
            <input type="password" id="gatekeeperInput" placeholder="Paste your API key here...">
            <button id="saveGatekeeperKey" class="btn-primary full-width">INITIALIZE SYSTEM</button>
            <p class="note">Stored locally in your browser. Never uploaded to servers.</p>
        </div>
    </div>

    <div id="app">
        <header class="main-header">
            <div class="header-content">
                <div class="brand-row">
                    <div class="brand">
                        <div class="logo-box"><i data-lucide="sparkles"></i></div>
                        <div>
                            <h1>APEX WISHLIST</h1>
                            <p class="subtitle">TRACK SKINS · HEIRLOOMS · CRAFTING</p>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button id="openAddBtn" class="btn-primary"><i data-lucide="plus"></i> ADD ITEM</button>
                        <button onclick="clearApiKey()" class="btn-icon-alt" title="Clear API Key"><i data-lucide="key"></i></button>
                    </div>
                </div>

                <div class="stats-bar" id="statsBar">
                    </div>
            </div>

            <nav class="tabs">
                <button class="tab-btn active" data-tab="wishlist">◈ WISHLIST</button>
                <button class="tab-btn" data-tab="crafting">⬡ CRAFTING</button>
                <button class="tab-btn" data-tab="stats">▣ STATS</button>
            </nav>
        </header>

        <main class="container">
            <section id="wishlist-tab" class="tab-content active">
                <div class="filter-row">
                    <select id="filterCategory"></select>
                    <select id="filterRarity">
                        <option value="all">All Rarities</option>
                        <option value="Common">Common</option>
                        <option value="Rare">Rare</option>
                        <option value="Epic">Epic</option>
                        <option value="Legendary">Legendary</option>
                        <option value="Heirloom">Heirloom</option>
                    </select>
                    <select id="filterStatus">
                        <option value="all">All Status</option>
                        <option value="wanted">Wanted</option>
                        <option value="obtained">Obtained</option>
                    </select>
                    <span id="itemCount" class="item-count"></span>
                </div>
                <div id="wishlistGrid" class="grid"></div>
            </section>

            <section id="crafting-tab" class="tab-content">
                <div class="api-status-card">
                    <p>Fetching real-time replicator rotation via API...</p>
                    <button id="fetchCraftingBtn" class="btn-primary">
                        <i data-lucide="refresh-cw" id="refreshIcon"></i> SYNC ROTATION
                    </button>
                </div>
                <div id="craftingGrid" class="grid"></div>
            </section>

            <section id="stats-tab" class="tab-content">
                <div id="statsBreakdown" class="stats-grid"></div>
            </section>
        </main>

        <div id="modalOverlay" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h2>◈ ADD TO WISHLIST</h2>
                    <button id="closeModalBtn" class="btn-icon"><i data-lucide="x"></i></button>
                </div>
                <div class="form-grid">
                    <label class="label-mini">ITEM NAME *</label>
                    <input type="text" id="formName" placeholder="e.g. Void Prowler">
                    
                    <label class="label-mini">CATEGORY</label>
                    <select id="formCategory"></select>

                    <div class="row-2">
                        <div>
                            <label class="label-mini">RARITY</label>
                            <select id="formRarity">
                                <option value="Common">Common</option>
                                <option value="Rare">Rare</option>
                                <option value="Epic">Epic</option>
                                <option value="Legendary" selected>Legendary</option>
                                <option value="Heirloom">Heirloom</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-mini">PRIORITY</label>
                            <select id="formPriority">
                                <option value="High">High</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Low">Low</option>
                            </select>
                        </div>
                    </div>

                    <div class="row-2">
                        <div>
                            <label class="label-mini">CURRENCY</label>
                            <select id="formCurrency">
                                <option value="AC">Apex Coins</option>
                                <option value="CM">Crafting Metals</option>
                                <option value="Shards">Shards</option>
                                <option value="Free">Free</option>
                            </select>
                        </div>
                        <div>
                            <label class="label-mini">COST</label>
                            <input type="number" id="formCost" value="1800">
                        </div>
                    </div>

                    <button id="saveItemBtn" class="btn-primary full-width">CONFIRM ADDITION</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
